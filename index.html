<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #d4af37; text-align: center; font-family: sans-serif; user-select: none; }
        .coin { 
            width: 220px; height: 220px; background: radial-gradient(#ffe600, #b8860b);
            border-radius: 50%; margin: 40px auto; cursor: pointer;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 90px; transition: transform 0.05s; border: 5px solid #8b6508;
        }
        .coin:active { transform: scale(0.95); }
        .stats { font-size: 26px; color: #fff; margin-top: 20px; font-weight: bold; }
        .save-btn {
            background: #d4af37; color: #000; border: none; padding: 15px 30px;
            font-weight: bold; border-radius: 12px; font-size: 18px; cursor: pointer;
            margin-top: 20px; width: 85%; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
    <div class="stats">БАЛАНС: <span id="gvala">0</span> 🪙</div>
    <div class="coin" id="clicker">💰</div>
    <p style="color: #888;">2 клика = 1 Гвала</p>
    
    <button class="save-btn" id="save">💾 ЗАБРАТЬ И ВЫЙТИ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let clicks = 0;
        let totalGvala = 0;

        const gvalaSpan = document.getElementById('gvala');
        const btn = document.getElementById('clicker');
        const saveBtn = document.getElementById('save');

        btn.onclick = () => {
            clicks++;
            // ПРОВЕРКА НА 2 КЛИКА
            if (clicks % 2 === 0) {
                totalGvala++;
                gvalaSpan.innerText = totalGvala;
                // Легкая вибрация
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        };

        saveBtn.onclick = () => {
            if (totalGvala > 0) {
                // Отправка боту БЕЗ АВТОМАТИЧЕСКОГО закрытия (через sendData окно всё равно закроется, но только один раз в конце)
                tg.sendData(JSON.stringify({action: "click_earn", amount: totalGvala}));
            } else {
                tg.close();
            }
        };
    </script>
</body>
</html>
