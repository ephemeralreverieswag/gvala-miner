<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; user-select: none; }
        .coin { 
            width: 200px; height: 200px; background: radial-gradient(#ffe600, #d4af37);
            border-radius: 50%; margin: 50px auto; cursor: pointer;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; transition: transform 0.1s;
        }
        .coin:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin-bottom: 10px; }
        .progress-bar { width: 80%; height: 10px; background: #333; margin: 20px auto; border-radius: 5px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: #ffe600; transition: width 0.2s; }
    </style>
</head>
<body>
    <h1>Гвала Майнер ⛏</h1>
    <div class="stats">Заработано: <span id="gvala">0</span> 🪙</div>
    <div class="progress-bar"><div id="fill"></div></div>
    <div class="coin" id="clicker">💰</div>
    <p>5 кликов = 1 Гвала</p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let clicks = 0;
        let gvala = 0;

        const btn = document.getElementById('clicker');
        const gvalaSpan = document.getElementById('gvala');
        const fill = document.getElementById('fill');

        btn.onclick = () => {
            clicks++;
            let progress = (clicks % 5) * 20;
            fill.style.width = (progress === 0 && clicks > 0 ? 100 : progress) + "%";

            if (clicks % 5 === 0) {
                gvala++;
                gvalaSpan.innerText = gvala;
                fill.style.width = "0%";
                // Отправляем данные боту
                tg.sendData(JSON.stringify({action: "click_earn", amount: 1}));
            }
        };
    </script>
</body>
</html>
